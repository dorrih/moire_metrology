name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs for a PR when a new commit is pushed.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: ruff
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install ruff
        run: pip install ruff
      - name: ruff check
        run: ruff check src/ tests/ examples/

  fast-tests:
    name: fast tests (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install package + dev extras
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[dev]'
      - name: pytest (fast subset)
        run: pytest -q

  slow-tests:
    name: slow integration tests
    runs-on: ubuntu-latest
    needs: fast-tests
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install package + dev extras
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[dev]'
      - name: pytest (slow subset)
        run: pytest -q -m slow

  example-smoke-tests:
    name: example smoke tests
    runs-on: ubuntu-latest
    needs: fast-tests
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install package + dev extras
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[dev]'
      - name: bilayer_relaxation.py --preset tmd
        working-directory: examples
        run: python bilayer_relaxation.py --preset tmd --no-plots --force
      - name: strain_extraction_and_pinning.py (Part A only)
        working-directory: examples
        run: python strain_extraction_and_pinning.py --skip-part-b
      - name: bilayer_relaxation.py --list-interfaces
        working-directory: examples
        run: python bilayer_relaxation.py --list-interfaces
      - name: bilayer_relaxation.py --interface TOML
        working-directory: examples
        run: python bilayer_relaxation.py --interface data/mose2_wse2_h.toml --theta-twist 2.0 --no-plots --force

  citation:
    name: validate CITATION.cff
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install cffconvert
        run: pip install cffconvert
      - name: Validate CITATION.cff
        run: cffconvert --validate -i CITATION.cff

  build:
    name: sdist + wheel
    runs-on: ubuntu-latest
    needs: fast-tests
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # hatch-vcs needs full history + tags
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install build
        run: pip install build
      - name: Build sdist + wheel
        run: python -m build
      - name: Smoke-test wheel install
        run: |
          python -m venv /tmp/wheel_test
          /tmp/wheel_test/bin/pip install dist/*.whl
          /tmp/wheel_test/bin/python -c "
          import moire_metrology
          from moire_metrology import GRAPHENE, RelaxationSolver, SolverConfig
          from moire_metrology.multilayer import LayerStack
          from moire_metrology.strain import get_strain_minimize_compression
          from moire_metrology.pinning import PinningMap
          print('version:', moire_metrology.__version__)
          "
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
